<!DOCTYPE html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Operace Nanonaut</title>
</head>
<body>
    <script>
        //Konstanty
        var CANVAS_WIDTH = 800;
        var CANVAS_HEIGHT = 600;
        var NANONAUT_WIDTH = 181;
        var NANONAUT_HEIGHT = 229;
        var ZEME_Y = 540;

        var NANONAUT_Y_ZRYCHLENI = 1;

        //Nastavení
        var canvas = document.createElement('canvas');
        var c = canvas.getContext('2d');
        canvas.width = CANVAS_WIDTH;
        canvas.height = CANVAS_HEIGHT;
        document.body.appendChild(canvas);

        var nanonautImage = new Image ();
        nanonautImage.src = 'program/Nanonaut.png';

        var pozadiImage = new Image ();
        pozadiImage.src = 'program/background.png';

        var nanonautX = 50;
        var nanonautY = 40;

        var nanonautYRychlost = 0;

        window.addEventListener('load' , start);

        function start () {
        window.requestAnimationFrame(mainLoop);
        }


        //Hlavní smyčka
        function mainLoop () {
        update ();
        draw();
        window.requestAnimationFrame (mainLoop);
        }

        //Reakce hráče
        

        //Aktualizace
        function update (){
            //aktualizace nanonauta
            nanonautY = nanonautY + nanonautYRychlost;
            nanonautYRychlost += NANONAUT_Y_ZRYCHLENI;


            if (nanonautY > (ZEME_Y - NANONAUT_HEIGHT)) {
                nanonautY = ZEME_Y - NANONAUT_HEIGHT;
                nanonautYRychlost = 0;
            }
        }

        //Zobrazení
        function draw (){

            //ZOBRAZENÍ OBLOHY 
            c.fillStyle = 'LightSkyBlue';
            c.fillRect (0, 0, CANVAS_WIDTH, ZEME_Y - 40);

            //Zobrazení pozadí
            c.drawImage(pozadiImage, 0, -210);

            // ZOBRAZENÍ ZEMĚ
            c.fillStyle = 'ForestGreen';
            c.fillRect (0, ZEME_Y - 40, CANVAS_WIDTH, CANVAS_HEIGHT - ZEME_Y + 40);

            // ZOBRAZENÍ NANONAUTA
            c.drawImage (nanonautImage, nanonautX, nanonautY);
        }
        
    </script>

</body>
</html>
